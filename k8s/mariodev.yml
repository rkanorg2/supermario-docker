apiVersion: apps/v1
kind: Deployment
metadata:
  name: mario-deployment
  labels:
    app: mario
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mario
  template:
    metadata:
      labels:
        app: mario
    spec:
      containers:
        - name: mario
          # Replaced by CI with the immutable commit-SHA tag (see .github/workflows/build-deploy.yml).
          # Using an immutable tag is required for Defender for Cloud to correlate the
          # running workload with the scanned ACR image in the cloud security graph.
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
